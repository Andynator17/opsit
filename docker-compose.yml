name: opsit

# ---------------------------------------------------------------------
# OpsIT - sidecar stack for an existing Traefik + n8n setup on hitex.at.
#
# Existing on the host:
#   - traefik-nhwc      (reverse proxy, network_mode: host, ports 80/443)
#   - n8n-irio          (n8n; routed via Traefik on n8n.hitex.at)
#   - postgresql-cjc4   (separate Postgres instance, NOT used by OpsIT)
#
# Routing layout (Variant A: single subdomain, path-based):
#   https://opsit-dev.hitex.at/         -> opsit-frontend (SPA, nginx)
#   https://opsit-dev.hitex.at/api/...  -> opsit-backend  (FastAPI)
#
# CORS-free: frontend and API share an origin.
#
# Network model
# -------------
# Traefik runs in `network_mode: host`, so it is NOT attached to any
# docker bridge network. It discovers containers via the docker socket
# and reaches them via their bridge-network IP (which is routable from
# the host namespace). The label
#     traefik.docker.network=opsit_web
# tells Traefik which of a container's networks to use for the
# upstream connection.
#
# `opsit_web` is created and managed by THIS compose file — no
# pre-creation needed.
# ---------------------------------------------------------------------

services:
  # ---------- PostgreSQL (OpsIT-only instance, not exposed) ----------
  postgres:
    image: postgres:16-alpine
    container_name: opsit-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - opsit_internal

  # ---------- OpsIT Backend (FastAPI) ----------
  backend:
    build:
      context: ./backend
    container_name: opsit-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL}
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: ${DEBUG}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES}
      REFRESH_TOKEN_EXPIRE_DAYS: ${REFRESH_TOKEN_EXPIRE_DAYS}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS}
      FIRST_ADMIN_EMAIL: ${FIRST_ADMIN_EMAIL}
      FIRST_ADMIN_PASSWORD: ${FIRST_ADMIN_PASSWORD}
      UPLOAD_DIR: /app/uploads
    volumes:
      - backend_uploads:/app/uploads
    networks:
      - opsit_internal   # talks to its own postgres
      - opsit_web        # discovered by host-mode Traefik
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=opsit_web"
      # Router: same host as frontend, but only paths starting with /api
      - "traefik.http.routers.opsit-backend.rule=Host(`${DOMAIN_OPSIT}`) && PathPrefix(`/api`)"
      - "traefik.http.routers.opsit-backend.entrypoints=websecure"
      - "traefik.http.routers.opsit-backend.tls=true"
      - "traefik.http.routers.opsit-backend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.opsit-backend.priority=100"
      - "traefik.http.services.opsit-backend.loadbalancer.server.port=8000"
      # 25 MB upload limit (matches MAX_FILE_SIZE_MB in backend)
      - "traefik.http.middlewares.opsit-backend-bodylimit.buffering.maxRequestBodyBytes=26214400"
      - "traefik.http.routers.opsit-backend.middlewares=opsit-backend-bodylimit@docker"

  # ---------- OpsIT Frontend (Vite SPA via nginx) ----------
  frontend:
    build:
      context: ./frontend
      args:
        # Relative URL: SPA calls its own origin -> Traefik routes /api/* to backend
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    container_name: opsit-frontend
    restart: unless-stopped
    networks:
      - opsit_web
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=opsit_web"
      # Router: catches everything else on the host (lower priority than backend)
      - "traefik.http.routers.opsit-frontend.rule=Host(`${DOMAIN_OPSIT}`)"
      - "traefik.http.routers.opsit-frontend.entrypoints=websecure"
      - "traefik.http.routers.opsit-frontend.tls=true"
      - "traefik.http.routers.opsit-frontend.tls.certresolver=letsencrypt"
      - "traefik.http.routers.opsit-frontend.priority=10"
      - "traefik.http.services.opsit-frontend.loadbalancer.server.port=80"

networks:
  # Private: OpsIT backend <-> its own postgres only
  opsit_internal:
    driver: bridge

  # Bridge that the host-mode Traefik reaches into to find OpsIT
  # frontend + backend. n8n-irio can later be attached to this same
  # network with `docker network connect opsit_web n8n-irio` so n8n
  # workflows can call http://opsit-backend:8000 directly.
  opsit_web:
    driver: bridge
    name: opsit_web

volumes:
  postgres_data:
  backend_uploads:
